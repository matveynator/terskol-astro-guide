<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Обсерватория Терскол: управление GPIO/DIO портами ECX-1000</title>
  <style>
    :root {
      --background: #0b1020;
      --card: #121a2f;
      --card-border: #1f2a44;
      --text: #e7edf8;
      --muted: #95a2bf;
      --green: #22c55e;
      --gray: #64748b;
      --blue: #3b82f6;
      --ui-alpha: 0.9;
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Segoe UI, Arial, sans-serif; background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url("/zeiss2000.jpg") center / cover fixed no-repeat, var(--background); color: var(--text); }
    main { max-width: min(1480px, 100%); margin: 0 auto; padding: clamp(8px, 1.1vw, 16px); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; gap: clamp(6px, 0.8vw, 12px); }
    h1 { font-size: clamp(14px, 1.4vw, 22px); margin: 0; line-height: 1.2; }
    .subtitle { color: var(--muted); margin: 0; font-size: clamp(10px, 0.9vw, 13px); }
    #error-text { min-height: 18px; color: #fca5a5; font-size: clamp(10px, 0.9vw, 13px); margin: 0; }
    .layout { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: clamp(6px, 0.8vw, 12px); min-height: 0; flex: 1; }
    .panel { background: rgba(18, 26, 47, var(--ui-alpha)); border: 1px solid var(--card-border); border-radius: 12px; padding: clamp(6px, 0.8vw, 12px); display: flex; flex-direction: column; min-height: 0; }
    .panel h2 { margin: 0 0 8px; font-size: clamp(11px, 1vw, 15px); }
    .channels { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: clamp(6px, 0.8vw, 10px); overflow: auto; min-height: 0; }
    .channel-card { border: 1px solid var(--card-border); border-radius: 10px; padding: clamp(5px, 0.7vw, 9px); display: flex; flex-direction: column; gap: 6px; background: rgba(9, 14, 28, var(--ui-alpha)); }
    .io-buttons { display: flex; gap: 6px; }
    button { border: 1px solid transparent; border-radius: 8px; height: clamp(24px, 2vw, 32px); font-size: clamp(11px, 0.9vw, 13px); color: white; cursor: pointer; background: rgba(51, 65, 85, var(--ui-alpha)); }
    .button-on, .button-off { flex: 1; }
    .button-on.active { background: rgba(34, 197, 94, var(--ui-alpha)); color: #06270f; font-weight: 700; }
    .button-off.active { background: rgba(156, 163, 175, var(--ui-alpha)); color: #0b1020; font-weight: 700; }

    .pwm-row { display: grid; grid-template-columns: 1fr; align-items: center; gap: 3px; }
    input[type="range"] { width: 100%; }
    .pwm-scale-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

    .input-display {
      position: relative;
      border: 1px solid #28354f;
      border-radius: 10px;
      min-height: 94px;
      background: linear-gradient(180deg, rgba(15, 23, 42, var(--ui-alpha)), rgba(16, 26, 49, var(--ui-alpha)));
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
    }
    .input-corner-indicator {
      position: absolute;
      left: 7px;
      top: 7px;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(100, 116, 139, var(--ui-alpha));
    }
    .input-corner-indicator.on {
      background: rgba(34, 197, 94, var(--ui-alpha));
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.95);
    }
    .input-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-left: 14px;
    }
    .input-label-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
      text-transform: uppercase;
      max-width: 82%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .input-icon-button {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(30, 41, 59, var(--ui-alpha));
      border: 1px solid #32415f;
      font-size: 14px;
      line-height: 1;
    }
    .input-name-editor {
      display: flex;
      gap: 6px;
      margin-left: 14px;
    }
    .input-name-editor input {
      flex: 1;
      height: 30px;
      border-radius: 8px;
      border: 1px solid #32415f;
      background: rgba(11, 18, 34, var(--ui-alpha));
      color: var(--text);
      padding: 0 8px;
      font-size: 13px;
    }
    .input-voltage-line {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
      font-family: "Segoe UI", "Roboto Mono", monospace;
      color: #dbe7ff;
      min-height: 42px;
    }
    .input-voltage-line.on { color: #86efac; }
    .input-status-line {
      display: flex;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    .output-display {
      position: relative;
      border: 1px solid #28354f;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(15, 23, 42, var(--ui-alpha)), rgba(16, 26, 49, var(--ui-alpha)));
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .output-corner-indicator {
      position: absolute;
      left: 7px;
      top: 7px;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(100, 116, 139, var(--ui-alpha));
    }
    .output-corner-indicator.on {
      background: rgba(34, 197, 94, var(--ui-alpha));
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.95);
    }
    .output-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-left: 14px;
      min-height: 30px;
    }
    .output-label-title { font-size: clamp(11px, 1vw, 14px); font-weight: 700; text-transform: uppercase; max-width: 78%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .port-title { font-size: clamp(10px, 0.8vw, 12px); color: var(--muted); margin-left: 14px; }
    .output-header-actions { display: flex; gap: 6px; }
    .output-name-editor {
      display: flex;
      gap: 6px;
      margin-left: 14px;
    }
    .output-name-editor input {
      flex: 1;
      height: 30px;
      border-radius: 8px;
      border: 1px solid #32415f;
      background: rgba(11, 18, 34, var(--ui-alpha));
      color: var(--text);
      padding: 0 8px;
      font-size: 13px;
    }
    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .channels { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 740px) {
      .channels { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<main>
  <h1>Обсерватория Терскол: управление GPIO/DIO портами ECX-1000</h1>
  <p class="subtitle">DIO 3.3V логика: 8 DI + 8 DO, PWM-регулировка выходного уровня</p>
  <p id="error-text"></p>

  <section class="layout">
    <article class="panel">
      <h2>Входящие сигналы (реальные пины 1..8)</h2>
      <div id="input-grid" class="channels"></div>
    </article>

    <article class="panel">
      <h2>Исходящие сигналы (реальные пины 11..18)</h2>
      <div id="output-grid" class="channels"></div>
    </article>
  </section>
</main>

<script>
  const applicationModel = {
    inputsByChannel: {},
    outputsByChannel: {},
    pendingRequest: false,
    errorText: "",
    editingInputLabelsByChannel: {},
    editingOutputLabelsByChannel: {}
  };
  const outputMaxVoltage = 3.3;

  const inputGridElement = document.getElementById("input-grid");
  const outputGridElement = document.getElementById("output-grid");
  const errorTextElement = document.getElementById("error-text");

  function renderFromModel() {
    errorTextElement.textContent = applicationModel.errorText;
    renderInputs();
    renderOutputs();
  }

  function renderInputs() {
    inputGridElement.innerHTML = "";
    const sortedInputChannels = Object.keys(applicationModel.inputsByChannel).map(Number).sort(sortAscendingNumbers);

    sortedInputChannels.forEach(function renderSingleInput(inputChannel) {
      const inputState = applicationModel.inputsByChannel[inputChannel];
      const inputLabelDraft = applicationModel.editingInputLabelsByChannel[inputChannel];
      const isEditingInputLabel = Object.prototype.hasOwnProperty.call(applicationModel.editingInputLabelsByChannel, inputChannel);
      const inputPinNumber = inputChannel;

      const inputCardElement = document.createElement("article");
      inputCardElement.className = "channel-card";

      const inputDisplayElement = document.createElement("section");
      inputDisplayElement.className = "input-display";

      const inputCornerIndicatorElement = document.createElement("span");
      inputCornerIndicatorElement.className = inputState.signal === "on" ? "input-corner-indicator on" : "input-corner-indicator";

      if (isEditingInputLabel) {
        const inputNameEditorElement = document.createElement("div");
        inputNameEditorElement.className = "input-name-editor";

        const inputNameFieldElement = document.createElement("input");
        inputNameFieldElement.value = inputLabelDraft;
        inputNameFieldElement.disabled = applicationModel.pendingRequest;
        inputNameFieldElement.addEventListener("input", function handleInputLabelTyping() {
          applicationModel.editingInputLabelsByChannel[inputChannel] = inputNameFieldElement.value;
        });

        const saveInputNameButtonElement = document.createElement("button");
        saveInputNameButtonElement.className = "input-icon-button";
        saveInputNameButtonElement.textContent = "💾";
        saveInputNameButtonElement.disabled = applicationModel.pendingRequest;
        saveInputNameButtonElement.addEventListener("click", function handleInputLabelSave() {
          void sendInputLabelToServer(inputChannel, inputNameFieldElement.value);
        });

        inputNameEditorElement.appendChild(inputNameFieldElement);
        inputNameEditorElement.appendChild(saveInputNameButtonElement);
        inputDisplayElement.appendChild(inputNameEditorElement);
      } else {
        const inputHeaderRowElement = document.createElement("div");
        inputHeaderRowElement.className = "input-header-row";

        const inputLabelTitleElement = document.createElement("div");
        inputLabelTitleElement.className = "input-label-title";
        inputLabelTitleElement.textContent = inputState.label;

        const editInputNameButtonElement = document.createElement("button");
        editInputNameButtonElement.className = "input-icon-button";
        editInputNameButtonElement.textContent = "✎";
        editInputNameButtonElement.disabled = applicationModel.pendingRequest;
        editInputNameButtonElement.addEventListener("click", function handleInputLabelEditStart() {
          applicationModel.editingInputLabelsByChannel[inputChannel] = inputState.label;
          renderFromModel();
        });

        inputHeaderRowElement.appendChild(inputLabelTitleElement);
        inputHeaderRowElement.appendChild(editInputNameButtonElement);
        inputDisplayElement.appendChild(inputHeaderRowElement);

        const inputPortTitleElement = document.createElement("div");
        inputPortTitleElement.className = "port-title";
        inputPortTitleElement.textContent = "ПИН " + String(inputPinNumber);
        inputDisplayElement.appendChild(inputPortTitleElement);
      }

      const inputVoltageLineElement = document.createElement("div");
      inputVoltageLineElement.className = inputState.signal === "on" ? "input-voltage-line on" : "input-voltage-line";
      inputVoltageLineElement.textContent = inputState.voltage;

      const inputStatusLineElement = document.createElement("div");
      inputStatusLineElement.className = "input-status-line";
      inputStatusLineElement.textContent = inputState.hz + " • " + (inputState.signal === "on" ? "signal detected" : "no signal");

      inputDisplayElement.appendChild(inputCornerIndicatorElement);
      inputDisplayElement.appendChild(inputVoltageLineElement);
      inputDisplayElement.appendChild(inputStatusLineElement);

      inputCardElement.appendChild(inputDisplayElement);
      inputGridElement.appendChild(inputCardElement);
    });
  }

  function renderOutputs() {
    outputGridElement.innerHTML = "";
    const sortedOutputChannels = Object.keys(applicationModel.outputsByChannel).map(Number).sort(sortAscendingNumbers);

    sortedOutputChannels.forEach(function renderSingleOutput(outputChannel) {
      const outputState = applicationModel.outputsByChannel[outputChannel];
      const outputCardElement = document.createElement("article");
      outputCardElement.className = "channel-card";

      const outputDisplayElement = document.createElement("section");
      outputDisplayElement.className = "output-display";

      const outputCornerIndicatorElement = document.createElement("span");
      outputCornerIndicatorElement.className = outputState.power === "on" ? "output-corner-indicator on" : "output-corner-indicator";
      outputDisplayElement.appendChild(outputCornerIndicatorElement);

      const isEditingOutputLabel = Object.prototype.hasOwnProperty.call(applicationModel.editingOutputLabelsByChannel, outputChannel);
      const outputDraftLabel = isEditingOutputLabel ? applicationModel.editingOutputLabelsByChannel[outputChannel] : outputState.label;
      const outputPinNumber = outputChannel + 10;

      if (isEditingOutputLabel) {
        const outputNameEditorElement = document.createElement("div");
        outputNameEditorElement.className = "output-name-editor";

        const saveOutputNameButtonElement = document.createElement("button");
        saveOutputNameButtonElement.className = "input-icon-button";
        saveOutputNameButtonElement.textContent = "💾";
        saveOutputNameButtonElement.disabled = applicationModel.pendingRequest;
        saveOutputNameButtonElement.addEventListener("click", function handleOutputLabelSave() {
          const currentOutputLabel = applicationModel.editingOutputLabelsByChannel[outputChannel];
          void sendOutputLabelToServer(outputChannel, currentOutputLabel);
        });

        const outputNameFieldElement = document.createElement("input");
        outputNameFieldElement.value = outputDraftLabel;
        outputNameFieldElement.disabled = applicationModel.pendingRequest;
        outputNameFieldElement.addEventListener("input", function handleOutputLabelTyping() {
          applicationModel.editingOutputLabelsByChannel[outputChannel] = outputNameFieldElement.value;
        });

        outputNameEditorElement.appendChild(saveOutputNameButtonElement);
        outputNameEditorElement.appendChild(outputNameFieldElement);
        outputDisplayElement.appendChild(outputNameEditorElement);
      } else {
        const outputHeaderRowElement = document.createElement("div");
        outputHeaderRowElement.className = "output-header-row";

        const outputLabelTitleElement = document.createElement("div");
        outputLabelTitleElement.className = "output-label-title";
        outputLabelTitleElement.textContent = outputState.label;

        const outputHeaderActionsElement = document.createElement("div");
        outputHeaderActionsElement.className = "output-header-actions";

        const editOutputNameButtonElement = document.createElement("button");
        editOutputNameButtonElement.className = "input-icon-button";
        editOutputNameButtonElement.textContent = "✎";
        editOutputNameButtonElement.disabled = applicationModel.pendingRequest;
        editOutputNameButtonElement.addEventListener("click", function handleOutputLabelEditStart() {
          applicationModel.editingOutputLabelsByChannel[outputChannel] = outputState.label;
          renderFromModel();
        });

        outputHeaderActionsElement.appendChild(editOutputNameButtonElement);
        outputHeaderRowElement.appendChild(outputLabelTitleElement);
        outputHeaderRowElement.appendChild(outputHeaderActionsElement);
        outputDisplayElement.appendChild(outputHeaderRowElement);

        const outputPortTitleElement = document.createElement("div");
        outputPortTitleElement.className = "port-title";
        outputPortTitleElement.textContent = "ПИН " + String(outputPinNumber);
        outputDisplayElement.appendChild(outputPortTitleElement);
      }

      const buttonsRowElement = document.createElement("div");
      buttonsRowElement.className = "io-buttons";

      const enableOutputButtonElement = document.createElement("button");
      enableOutputButtonElement.className = outputState.power === "on" ? "button-on active" : "button-on";
      enableOutputButtonElement.textContent = "ON";
      enableOutputButtonElement.disabled = applicationModel.pendingRequest;
      enableOutputButtonElement.addEventListener("click", function handleEnableOutput() {
        void sendOutputPowerToServer(outputChannel, "on");
      });

      const disableOutputButtonElement = document.createElement("button");
      disableOutputButtonElement.className = outputState.power === "off" ? "button-off active" : "button-off";
      disableOutputButtonElement.textContent = "OFF";
      disableOutputButtonElement.disabled = applicationModel.pendingRequest;
      disableOutputButtonElement.addEventListener("click", function handleDisableOutput() {
        void sendOutputPowerToServer(outputChannel, "off");
      });

      buttonsRowElement.appendChild(enableOutputButtonElement);
      buttonsRowElement.appendChild(disableOutputButtonElement);

      const pwmRowElement = document.createElement("div");
      pwmRowElement.className = "pwm-row";

      const pwmSliderElement = document.createElement("input");
      pwmSliderElement.type = "range";
      pwmSliderElement.min = "0";
      pwmSliderElement.max = "100";
      pwmSliderElement.step = "1";
      pwmSliderElement.value = String(outputState.pwm);
      pwmSliderElement.disabled = applicationModel.pendingRequest;
      pwmSliderElement.addEventListener("change", function handlePWMChange() {
        void sendOutputPWMToServer(outputChannel, Number(pwmSliderElement.value));
      });

      const pwmScaleRowElement = document.createElement("div");
      pwmScaleRowElement.className = "pwm-scale-row";
      const pwmScaleLeftElement = document.createElement("span");
      pwmScaleLeftElement.textContent = "0.0V";
      const pwmScaleRightElement = document.createElement("span");
      pwmScaleRightElement.textContent = formatOutputVoltage(outputState.pwm);
      pwmSliderElement.addEventListener("input", function handlePWMLiveText() {
        pwmScaleRightElement.textContent = formatOutputVoltage(Number(pwmSliderElement.value));
      });

      pwmRowElement.appendChild(pwmSliderElement);
      pwmScaleRowElement.appendChild(pwmScaleLeftElement);
      pwmScaleRowElement.appendChild(pwmScaleRightElement);
      pwmRowElement.appendChild(pwmScaleRowElement);

      outputDisplayElement.appendChild(buttonsRowElement);
      outputDisplayElement.appendChild(pwmRowElement);
      outputCardElement.appendChild(outputDisplayElement);
      outputGridElement.appendChild(outputCardElement);
    });
  }

  function applyStateFromServer(serverState) {
    if (hasActiveLabelEditing()) {
      return;
    }

    const nextInputsByChannel = {};
    serverState.inputs.forEach(function registerInput(inputState) {
      nextInputsByChannel[inputState.channel] = inputState;
    });

    const nextOutputsByChannel = {};
    serverState.outputs.forEach(function registerOutput(outputState) {
      nextOutputsByChannel[outputState.channel] = outputState;
    });

    applicationModel.inputsByChannel = nextInputsByChannel;
    applicationModel.outputsByChannel = nextOutputsByChannel;
    applicationModel.errorText = "";
    renderFromModel();
  }

  async function requestStateFromServer() {
    const stateResponse = await fetch("/api/state");
    if (!stateResponse.ok) {
      throw new Error("state request failed");
    }

    return stateResponse.json();
  }

  async function sendOutputPowerToServer(outputChannel, nextPower) {
    await runServerCommand(async function sendPowerCommand() {
      const powerResponse = await fetch("/api/output/power", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ channel: outputChannel, power: nextPower })
      });
      if (!powerResponse.ok) {
        throw new Error(await powerResponse.text());
      }

      applyStateFromServer(await powerResponse.json());
    });
  }

  async function sendOutputPWMToServer(outputChannel, nextPWM) {
    await runServerCommand(async function sendPWMCommand() {
      const pwmResponse = await fetch("/api/output/pwm", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ channel: outputChannel, pwm: nextPWM })
      });
      if (!pwmResponse.ok) {
        throw new Error(await pwmResponse.text());
      }

      applyStateFromServer(await pwmResponse.json());
    });
  }

  async function sendInputLabelToServer(inputChannel, nextLabel) {
    await runServerCommand(async function sendInputLabelCommand() {
      const labelResponse = await fetch("/api/label", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ kind: "input", channel: inputChannel, label: nextLabel })
      });
      if (!labelResponse.ok) {
        throw new Error(await labelResponse.text());
      }

      delete applicationModel.editingInputLabelsByChannel[inputChannel];
      applyStateFromServer(await labelResponse.json());
    });
  }

  async function sendOutputLabelToServer(channel, nextLabel) {
    await runServerCommand(async function sendLabelCommand() {
      const labelResponse = await fetch("/api/label", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ kind: "output", channel: channel, label: nextLabel })
      });
      if (!labelResponse.ok) {
        throw new Error(await labelResponse.text());
      }

      delete applicationModel.editingOutputLabelsByChannel[channel];
      applyStateFromServer(await labelResponse.json());
    });
  }

  async function runServerCommand(serverCommandCallback) {
    applicationModel.pendingRequest = true;
    applicationModel.errorText = "";
    renderFromModel();

    try {
      await serverCommandCallback();
    } catch (requestError) {
      applicationModel.errorText = String(requestError);
    } finally {
      applicationModel.pendingRequest = false;
      renderFromModel();
    }
  }

  function sortAscendingNumbers(leftNumber, rightNumber) {
    return leftNumber - rightNumber;
  }

  function formatOutputVoltage(outputPWMPercent) {
    const outputVoltage = (outputPWMPercent / 100) * outputMaxVoltage;
    return outputVoltage.toFixed(2) + "V";
  }

  function startSignalRefreshLoop() {
    setInterval(function pollState() {
      if (hasActiveLabelEditing()) {
        return;
      }

      requestStateFromServer().then(applyStateFromServer).catch(function handleRefreshError(refreshError) {
        applicationModel.errorText = String(refreshError);
        renderFromModel();
      });
    }, 600);
  }

  function hasActiveLabelEditing() {
    const hasInputEditing = Object.keys(applicationModel.editingInputLabelsByChannel).length > 0;
    const hasOutputEditing = Object.keys(applicationModel.editingOutputLabelsByChannel).length > 0;
    return hasInputEditing || hasOutputEditing;
  }

  requestStateFromServer().then(applyStateFromServer).catch(function handleInitialError(initialError) {
    applicationModel.errorText = String(initialError);
    renderFromModel();
  });

  startSignalRefreshLoop();
  renderFromModel();
</script>
</body>
</html>
