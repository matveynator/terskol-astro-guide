<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIO Power Control</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    main { width: 360px; background: #1e293b; border-radius: 12px; padding: 20px; }
    .row { margin: 12px 0; }
    .buttons { display: flex; gap: 10px; }
    button { flex: 1; border: 0; border-radius: 8px; padding: 10px; color: white; cursor: pointer; }
    #on-button { background: #16a34a; }
    #off-button { background: #dc2626; }
    #error-text { min-height: 20px; color: #fca5a5; }
  </style>
</head>
<body>
<main>
  <h1>DIO Port 1</h1>
  <p class="row">Power: <strong id="power-text">unknown</strong></p>
  <div class="buttons row">
    <button id="on-button">Включить</button>
    <button id="off-button">Выключить</button>
  </div>
  <p id="error-text"></p>
</main>
<script>
  const applicationModel = { currentPower: "unknown", isPending: false, errorText: "" };

  const powerTextElement = document.getElementById("power-text");
  const onButtonElement = document.getElementById("on-button");
  const offButtonElement = document.getElementById("off-button");
  const errorTextElement = document.getElementById("error-text");

  function renderFromModel() {
    powerTextElement.textContent = applicationModel.currentPower;
    onButtonElement.disabled = applicationModel.isPending;
    offButtonElement.disabled = applicationModel.isPending;
    errorTextElement.textContent = applicationModel.errorText;
  }

  function applyServerState(serverState) {
    applicationModel.currentPower = serverState.power;
    applicationModel.errorText = "";
    renderFromModel();
  }

  async function requestStateFromServer() {
    const response = await fetch("/api/state");
    if (!response.ok) {
      throw new Error("state request failed");
    }
    return response.json();
  }

  async function sendPowerToServer(nextPower) {
    applicationModel.isPending = true;
    applicationModel.errorText = "";
    renderFromModel();

    try {
      const response = await fetch("/api/power", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ power: nextPower })
      });
      if (!response.ok) {
        throw new Error(await response.text());
      }
      applyServerState(await response.json());
    } catch (requestError) {
      applicationModel.errorText = String(requestError);
    } finally {
      applicationModel.isPending = false;
      renderFromModel();
    }
  }

  onButtonElement.addEventListener("click", function onPowerOnClick() {
    void sendPowerToServer("on");
  });

  offButtonElement.addEventListener("click", function onPowerOffClick() {
    void sendPowerToServer("off");
  });

  requestStateFromServer().then(applyServerState).catch(function onInitError(initError) {
    applicationModel.errorText = String(initError);
    renderFromModel();
  });

  renderFromModel();
</script>
</body>
</html>
